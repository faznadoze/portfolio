<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Agência Doze</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root {
      --lime: #DAF66F;
      --orange: #EC664A;
      --purple: #5456D1;
      --pink: #F0B9DA;
      --light: #F7F7F7;
      --dark: #121212;
      --gray: #1e1e1e;
      --gray2: #2a2a2a;
      --text-muted: #777;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--dark);
      color: var(--light);
      min-height: 100vh;
    }

    /* ── AUTH GUARD ── */
    #auth-guard {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
      gap: 16px;
      text-align: center;
      padding: 40px;
    }

    #auth-guard p { color: var(--text-muted); font-size: 14px; }

    /* ── LAYOUT ── */
    #app { display: none; }

    header {
      padding: 20px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: rgba(18,18,18,0.9);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .header-brand svg {
      height: 22px;
      fill: var(--light);
    }

    .header-tag {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--lime);
      background: rgba(218,246,111,0.1);
      border: 1px solid rgba(218,246,111,0.2);
      padding: 4px 10px;
      border-radius: 100px;
    }

    .header-user {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #admin-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      object-fit: cover;
      background: var(--gray2);
    }

    #admin-user-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
    }

    .btn-signout {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--text-muted);
      font-size: 12px;
      padding: 8px 16px;
      border-radius: 100px;
      cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
      transition: all 0.2s;
    }

    .btn-signout:hover { border-color: var(--orange); color: var(--orange); }

    /* ── MAIN ── */
    main { padding: 48px; max-width: 1200px; margin: 0 auto; }

    .page-title {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(32px, 4vw, 48px);
      letter-spacing: -1px;
      font-weight: 400;
      margin-bottom: 8px;
    }

    .page-title em { font-style: italic; color: var(--lime); }

    .page-sub {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 40px;
    }

    /* ── STATS ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: var(--gray);
      border-radius: 16px;
      padding: 24px;
    }

    .stat-card-label {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .stat-card-value {
      font-family: 'Instrument Serif', serif;
      font-size: 36px;
      letter-spacing: -1px;
      line-height: 1;
    }

    .stat-card-value.green { color: var(--lime); }
    .stat-card-value.orange { color: var(--orange); }

    /* ── FILTERS ── */
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: var(--gray);
      border: 1px solid rgba(255,255,255,0.06);
      color: var(--text-muted);
      font-size: 12px;
      padding: 8px 18px;
      border-radius: 100px;
      cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
      transition: all 0.2s;
    }

    .filter-btn.active,
    .filter-btn:hover {
      border-color: var(--lime);
      color: var(--lime);
      background: rgba(218,246,111,0.06);
    }

    /* ── TABLE ── */
    .table-wrap {
      background: var(--gray);
      border-radius: 20px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      padding: 16px 20px;
      text-align: left;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.02);
      font-weight: 500;
    }

    tbody tr {
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 0.15s;
      cursor: pointer;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.03); }

    td { padding: 16px 20px; font-size: 13px; vertical-align: middle; }

    .td-client { font-weight: 500; color: var(--light); }


    .td-contact {
      font-size: 12px;
      color: var(--light);
      line-height: 1.7;
    }

    .td-total {

      font-family: 'Instrument Serif', serif;
      font-size: 18px;
      letter-spacing: -0.5px;
      color: var(--lime);
    }

    .td-date { color: var(--text-muted); font-size: 12px; }

    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: 600;
    }

    .status-novo {
      background: rgba(218,246,111,0.12);
      color: var(--lime);
    }

    .status-visto {
      background: rgba(255,255,255,0.06);
      color: var(--text-muted);
    }

    .status-fechado {
      background: rgba(236,102,74,0.12);
      color: var(--orange);
    }

    .btn-mark {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-muted);
      font-size: 11px;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
      transition: all 0.15s;
    }

    .btn-mark:hover {
      border-color: var(--lime);
      color: var(--lime);
    }

    /* Detalhe do pedido */
    .detail-row td {
      padding: 0;
      background: rgba(0,0,0,0.2);
    }

    .detail-inner {
      padding: 20px 20px 24px 40px;
      display: none;
    }

    .detail-inner.open { display: block; }

    .detail-items {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-width: 480px;
    }

    .detail-item {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--text-muted);
    }

    .detail-item-name { color: var(--light); }

    /* Empty + Loading */
    .empty-state, .loading-state {
      text-align: center;
      padding: 80px 40px;
      color: var(--text-muted);
      font-size: 14px;
    }

    .empty-state-icon { font-size: 40px; margin-bottom: 16px; }

    .spinner {
      width: 32px; height: 32px;
      border: 2px solid rgba(255,255,255,0.08);
      border-top-color: var(--lime);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- Auth guard (mostra enquanto verifica) -->
  <div id="auth-guard">
    <div class="spinner"></div>
    <p>Verificando acesso…</p>
  </div>

  <!-- App (mostrado após auth OK) -->
  <div id="app">
    <header>
      <div class="header-brand">
        <svg viewBox="0 0 204 104" xmlns="http://www.w3.org/2000/svg">
          <path d="M36.7669 20.4932C35.774 19.6636 34.7186 18.9162 33.5772 18.2705C31.8065 17.2649 29.8872 16.4822 27.8194 15.9187C25.7517 15.3591 23.6252 15.0774 21.4402 15.0774C18.2505 15.0774 15.3423 15.6409 12.7156 16.764C10.0888 17.887 7.82947 19.4562 5.93758 21.4637C4.04568 23.475 2.58376 25.8973 1.55182 28.7343C0.515971 31.5714 0 34.7058 0 38.1337C0 41.8004 0.621511 45.1852 1.86062 48.2884C3.09974 51.3915 4.82746 54.0681 7.04379 56.3143C9.26012 58.5604 11.9142 60.3057 15.0179 61.5462C18.1215 62.7866 21.5574 63.4088 25.3373 63.4088C29.1172 63.4088 32.4397 62.7866 35.4808 61.5462C38.5219 60.3057 41.1174 58.5174 43.2751 56.1812C45.4289 53.8451 47.098 51.0237 48.2785 47.7131C49.459 44.4026 50.0492 40.7086 50.0492 36.6272V0H36.7629V20.4932H36.7669Z" fill="currentColor"/>
          <path d="M153.935 26.3356V15.8718H109.292V27.3999H135.188L109.026 52.1428V61.8083H154.201V50.1041H128.969L153.935 26.3356Z" fill="currentColor"/>
        </svg>
        <span class="header-tag">Admin</span>
      </div>
      <div class="header-user">
        <img id="admin-avatar" src="" alt="">
        <span id="admin-user-name"></span>
        <button class="btn-signout" id="admin-signout">Sair</button>
      </div>
    </header>

    <main>
      <h1 class="page-title">Pedidos de <em>orçamento</em></h1>
      <p class="page-sub" id="page-sub">Carregando…</p>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-card-label">Total de pedidos</div>
          <div class="stat-card-value" id="stat-total">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Novos (não vistos)</div>
          <div class="stat-card-value green" id="stat-novos">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Volume total (R$)</div>
          <div class="stat-card-value orange" id="stat-volume">—</div>
        </div>
      </div>

      <div class="filters">
        <button class="filter-btn active" data-filter="todos">Todos</button>
        <button class="filter-btn" data-filter="novo">Novos</button>
        <button class="filter-btn" data-filter="visto">Vistos</button>
        <button class="filter-btn" data-filter="fechado">Fechados</button>
      </div>

      <div class="table-wrap">
        <div id="table-container" class="loading-state">
          <div class="spinner"></div>
          <p>Carregando pedidos…</p>
        </div>
      </div>
    </main>
  </div>

  <!-- Clerk CDN -->
  <script
    data-clerk-publishable-key="pk_test_dXByaWdodC1iYWJvb24tNDUuY2xlcmsuYWNjb3VudHMuZGV2JA"
    src="https://upright-baboon-45.clerk.accounts.dev/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
    type="text/javascript">
  </script>
  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <!-- Config -->
  <script src="auth/config.js"></script>

  <script>
  (async function () {
    const cfg = window.DOZE_CONFIG;

    // ── Auth ──────────────────────────────────
    await window.Clerk.load();
    const clerk = window.Clerk;

    const user = clerk.user;
    const email = user?.emailAddresses?.[0]?.emailAddress || '';
    const isAdmin = user && cfg.adminEmails.includes(email);

    if (!isAdmin) {
      document.getElementById('auth-guard').innerHTML = `
        <div style="font-size:36px">🔒</div>
        <h2 style="font-family:'Instrument Serif',serif;font-size:28px;font-weight:400">Acesso restrito</h2>
        <p>${user ? 'Sua conta não tem permissão de admin.' : 'Faça login com uma conta admin.'}</p>
        <button onclick="clerk.openSignIn()" style="margin-top:16px;background:var(--lime);color:var(--dark);border:none;padding:12px 28px;border-radius:100px;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;cursor:pointer;">
          ${user ? 'Trocar conta' : 'Fazer login'}
        </button>
      `;
      return;
    }

    // Mostra app, esconde guard
    document.getElementById('auth-guard').style.display = 'none';
    document.getElementById('app').style.display = 'block';

    // Header user
    const avatar = document.getElementById('admin-avatar');
    if (user.imageUrl) avatar.src = user.imageUrl;
    document.getElementById('admin-user-name').textContent =
      user.firstName || email.split('@')[0];

    document.getElementById('admin-signout').addEventListener('click', async () => {
      await clerk.signOut();
      location.href = 'index.html';
    });

    // ── Supabase ──────────────────────────────
    const supabaseReady = cfg.supabaseUrl !== 'COLE_AQUI_A_URL_DO_PROJETO'
      && cfg.supabaseAnonKey !== 'COLE_AQUI_A_CHAVE_PUBLISHABLE';

    if (!supabaseReady) {
      document.getElementById('table-container').innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">⚙️</div>
          <p>Configure o Supabase em <code>auth/config.js</code> para ver os pedidos.</p>
        </div>`;
      document.getElementById('page-sub').textContent = 'Supabase não configurado ainda.';
      updateStats([], 0);
      return;
    }

    const sb = window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);

    // ── Carrega dados ─────────────────────────
    let allData = [];
    let activeFilter = 'todos';

    async function loadData() {
      const { data, error } = await sb
        .from('orcamentos')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        document.getElementById('table-container').innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">❌</div>
            <p>Erro ao carregar: ${error.message}</p>
          </div>`;
        return;
      }

      allData = data || [];
      renderTable(allData);
      updateStats(allData);
      document.getElementById('page-sub').textContent =
        `${allData.length} pedido${allData.length !== 1 ? 's' : ''} encontrado${allData.length !== 1 ? 's' : ''}.`;
    }

    function updateStats(data) {
      const novos  = data.filter(r => r.status === 'novo').length;
      const volume = data.reduce((s, r) => s + (r.total || 0), 0);
      document.getElementById('stat-total').textContent  = data.length;
      document.getElementById('stat-novos').textContent  = novos;
      document.getElementById('stat-volume').textContent =
        'R$\u00a0' + volume.toLocaleString('pt-BR', { minimumFractionDigits: 0 });
    }

    function renderTable(data) {
      if (!data.length) {
        document.getElementById('table-container').innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📋</div>
            <p>Nenhum pedido encontrado.</p>
          </div>`;
        return;
      }

      const rows = data.map((r, idx) => {
        const date = new Date(r.created_at).toLocaleDateString('pt-BR', {
          day: '2-digit', month: 'short', year: 'numeric',
          hour: '2-digit', minute: '2-digit'
        });
        const total = (r.total || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2 });
        const statusClass = `status-${r.status || 'novo'}`;
        const statusLabel = { novo: 'Novo', visto: 'Visto', fechado: 'Fechado' }[r.status] || 'Novo';

        const isGuest = !r.user_id;
        const contactName  = r.user_name  || r.client_name || '—';
        const contactEmail = r.contact_email || r.user_email || '';
        const contactPhone = r.contact_phone || '';
        const guestBadge   = isGuest
          ? `<span style="font-size:10px;background:rgba(218,246,111,0.1);color:var(--lime);border:1px solid rgba(218,246,111,0.2);padding:2px 8px;border-radius:100px;letter-spacing:1px;">VISITANTE</span><br>`
          : '';
        const contactHtml = `${guestBadge}${contactName}<br><span style="color:var(--text-muted)">${contactEmail}</span>`;

        const itemsHtml = (r.items || []).map(i =>
          `<div class="detail-item">
            <span class="detail-item-name">${i.nome || i.name || ''}</span>
            <span>${i.preco || i.price || ''}</span>
          </div>`
        ).join('');

        const phoneRow = contactPhone
          ? `<div style="margin-top:12px;font-size:13px;"><span style="color:var(--text-muted);">WhatsApp/Tel: </span><a href="https://wa.me/55${contactPhone.replace(/\D/g,'')}" target="_blank" style="color:var(--lime);text-decoration:none;font-weight:600;">${contactPhone}</a></div>`
          : '';
        const notesRow = r.notes
          ? `<div style="margin-top:12px;font-size:13px;padding:12px;background:rgba(255,255,255,0.03);border-radius:8px;border:1px solid rgba(255,255,255,0.06);color:var(--text-muted);line-height:1.6;"><span style="color:var(--light);font-weight:600;">Observações:</span> ${r.notes}</div>`
          : '';

        return `
          <tr onclick="toggleDetail(${idx})">
            <td class="td-client">${r.client_name || '—'}</td>
            <td class="td-contact">${contactHtml}</td>
            <td class="td-total">R$&nbsp;${total}</td>
            <td><span class="status-badge ${statusClass}">${statusLabel}</span></td>
            <td class="td-date">${date}</td>
            <td>
              <button class="btn-mark" onclick="event.stopPropagation(); markStatus('${r.id}', 'visto')">
                Marcar visto
              </button>
            </td>
          </tr>
          <tr class="detail-row">
            <td colspan="6">
              <div class="detail-inner" id="detail-${idx}">
                <div class="detail-items">${itemsHtml}</div>
                ${phoneRow}
                ${notesRow}
              </div>
            </td>
          </tr>`;
      }).join('');

      document.getElementById('table-container').innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Cliente</th>
              <th>Contato</th>
              <th>Total</th>
              <th>Status</th>
              <th>Data</th>
              <th></th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    window.toggleDetail = function(idx) {
      const el = document.getElementById(`detail-${idx}`);
      if (el) el.classList.toggle('open');
    };

    window.markStatus = async function(id, status) {
      await sb.from('orcamentos').update({ status }).eq('id', id);
      const item = allData.find(r => r.id === id);
      if (item) item.status = status;
      renderTable(filterData(activeFilter));
      updateStats(allData);
    };

    function filterData(f) {
      return f === 'todos' ? allData : allData.filter(r => r.status === f);
    }

    // Filtros
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.filter;
        renderTable(filterData(activeFilter));
      });
    });

    loadData();
  })();
  </script>
</body>
</html>
